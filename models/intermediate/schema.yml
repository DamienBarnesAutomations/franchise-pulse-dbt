version: 2

models:
  - name: int_sales_validated
    description: "Business validation layer. Adds calculated revenue columns and filters outliers."
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: unit_price
        tests:
          - not_null
      - name: net_revenue
        tests:
          - not_null
      - name: is_refund
        tests:
          - accepted_values:
              values: [0, 1]

  - name: int_sales_enriched
    description: "Enriched sales data joined with dimensions. Ready for mart layer."
    columns:
      - name: transaction_id
        tests:
          - not_null
          - unique
      - name: store_key
        tests:
          - not_null
      - name: product_key
        tests:
          - not_null
      - name: date_key
        tests:
          - not_null
      - name: payment_key
        tests:
          - not_null
      - name: net_revenue
        tests:
          - not_null
